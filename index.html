<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northside Circuit 2026 — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:       #009be7;
    --brand-dark:  #0077b3;
    --brand-deep:  #004e78;
    --brand-dim:   #001e2e;
    --brand-glow:  rgba(0,155,231,0.15);

    --accent:      #ffb739;
    --accent-dark: #c98a1a;
    --accent-dim:  rgba(255,183,57,0.15);

    --dark:        #0e1520;
    --dark2:       #141d2b;
    --card:        #1a2535;
    --card2:       #1f2e40;

    --white:       #ffffff;
    --off-white:   #d0e4f0;
    --muted:       #6a8da8;
    --border:      rgba(0,155,231,0.2);
    --border-dim:  rgba(0,155,231,0.09);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,155,231,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--brand), var(--accent), var(--brand));
    z-index: 100;
  }

  .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── HEADER ── */
  header {
    padding: 52px 0 32px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border-dim);
    margin-bottom: 32px;
    flex-wrap: wrap; gap: 16px;
  }
  .circuit-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
  }
  .circuit-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 6vw, 76px);
    line-height: 0.88; letter-spacing: 0.02em; color: var(--white);
  }
  .circuit-title span { color: var(--brand); }
  .circuit-sub { margin-top: 12px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent-dim); border: 1px solid rgba(255,183,57,0.35);
    color: var(--accent); font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 7px 16px; border-radius: 20px; white-space: nowrap; font-weight: 500;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── STATS ── */
  .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border-dim);
    border-top: 2px solid var(--brand); border-radius: 10px; padding: 14px 16px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--white); line-height: 1; }
  .stat-val.accent { color: var(--accent); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border-dim); }

  /* ── PODIUM ── */
  .podium-section { margin-bottom: 28px; }
  .podium { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; align-items: end; }
  .podium-card {
    background: var(--card); border: 1px solid var(--border-dim);
    border-radius: 14px; padding: 20px 16px 18px;
    text-align: center; position: relative; transition: transform 0.2s;
  }
  .podium-card:hover { transform: translateY(-4px); }
  .podium-card.p1 { border-color: var(--accent); border-width: 2px; background: linear-gradient(160deg,#1c1706 0%,var(--card) 55%); padding-top: 28px; }
  .podium-card.p2 { border-color: rgba(0,155,231,0.45); border-width: 1.5px; }
  .podium-card.p3 { border-color: var(--border-dim); }
  .podium-rank { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:0.12em; position:absolute; top:10px; left:50%; transform:translateX(-50%); white-space:nowrap; }
  .p1 .podium-rank { color: var(--accent); }
  .p2 .podium-rank { color: var(--brand); }
  .p3 .podium-rank { color: var(--muted); }
  .podium-avatar { width:56px; height:56px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; overflow:hidden; }
  .podium-avatar img { width:100%; height:100%; object-fit:cover; }
  .p1 .podium-avatar { background:var(--accent-dim); color:var(--accent); border:2px solid rgba(255,183,57,0.5); }
  .p2 .podium-avatar { background:var(--brand-glow); color:var(--brand); border:2px solid rgba(0,155,231,0.4); }
  .p3 .podium-avatar { background:rgba(0,155,231,0.07); color:var(--muted); border:2px solid var(--border-dim); }
  .podium-name { font-size:14px; font-weight:500; color:var(--white); margin-bottom:2px; }
  .podium-tag { font-size:11px; color:var(--muted); font-style:italic; margin-bottom:10px; }
  .podium-pts { font-family:'Bebas Neue',sans-serif; font-size:34px; line-height:1; }
  .p1 .podium-pts { color: var(--accent); }
  .p2 .podium-pts { color: var(--brand); }
  .p3 .podium-pts { color: var(--off-white); }
  .podium-pts-label { font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

  /* ── FILTERS ── */
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .filter-btn { font-family:'DM Sans',sans-serif; font-size:12px; padding:6px 16px; border-radius:20px; border:1px solid var(--border-dim); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .filter-btn:hover { border-color:var(--brand); color:var(--white); }
  .filter-btn.active { background:var(--brand); border-color:var(--brand); color:var(--white); font-weight:500; }

  /* ── TABLE ── */
  .table-wrap { background:var(--card); border:1px solid var(--border-dim); border-radius:14px; overflow:hidden; margin-bottom:28px; }
  table { width:100%; border-collapse:collapse; }
  thead th { background:var(--brand-deep); font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:0.14em; padding:11px 16px; text-align:left; white-space:nowrap; }
  thead th:first-child { width:48px; text-align:center; }
  thead th.r { text-align:right; }
  tbody tr { border-top:1px solid var(--border-dim); transition:background 0.1s; }
  tbody tr:hover { background:rgba(0,155,231,0.06); }
  td { padding:11px 16px; vertical-align:middle; }
  td:first-child { text-align:center; }
  .rank-num { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--muted); }
  .rank-num.gold { color:var(--accent); }
  .rank-num.blue { color:var(--brand); }
  .player-cell { display:flex; align-items:center; gap:12px; }
  .avatar { width:36px; height:36px; min-width:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .p-name { font-size:14px; font-weight:500; color:var(--white); }
  .p-tag { font-size:11px; color:var(--muted); font-style:italic; }
  .pts-cell { text-align:right; }
  .pts-main { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--white); display:block; line-height:1; }
  .pts-bar-row { display:flex; align-items:center; justify-content:flex-end; gap:6px; margin-top:3px; }
  .pts-bar { width:64px; height:3px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
  .pts-fill { height:100%; background:var(--brand); border-radius:2px; }
  .events-cell, .avg-cell { text-align:right; font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); }
  .wins-cell { text-align:right; font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--white); }

  /* ── GAME BREAKDOWN ── */
  .breakdown-section { margin-bottom:28px; }
  .game-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
  .game-card { background:var(--card); border:1px solid var(--border-dim); border-radius:12px; padding:16px; transition:border-color 0.2s; }
  .game-card:hover { border-color:var(--brand); }
  .game-card-title { font-size:12px; font-weight:600; color:var(--white); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .game-icon { font-size:15px; }
  .game-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-top:1px solid var(--border-dim); }
  .game-row:first-of-type { border-top:none; }
  .game-row-name { font-size:12px; color:var(--muted); }
  .game-row-pts { font-family:'DM Mono',monospace; font-size:12px; color:var(--white); }
  .game-champ { font-size:10px; color:var(--accent); font-family:'DM Mono',monospace; }

  /* ── LOADING / ERROR / SETUP ── */
  .loading-state { text-align:center; padding:80px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px; }
  .loading-spinner { width:30px; height:30px; border-radius:50%; border:2px solid var(--border-dim); border-top-color:var(--brand); animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-box { background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.25); border-radius:12px; padding:24px; text-align:center; color:#ff6b6b; font-family:'DM Mono',monospace; font-size:13px; }
  .setup-box { background:var(--card); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:14px; padding:36px; text-align:center; margin:20px 0; }
  .setup-box h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--accent); margin-bottom:14px; }
  .setup-box p { color:var(--muted); font-size:14px; line-height:1.8; margin-bottom:8px; }
  .setup-box code { font-family:'DM Mono',monospace; background:var(--brand-glow); border:1px solid var(--border); padding:2px 8px; border-radius:4px; font-size:12px; color:var(--brand); }

  /* ── FOOTER ── */
  footer { border-top:1px solid var(--border-dim); padding-top:24px; margin-top:40px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .footer-brand { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--muted); letter-spacing:0.06em; }
  .footer-note { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }
  .footer-dot { color:var(--accent); }

  @media (max-width:600px) {
    .podium { grid-template-columns:1fr; }
    thead th.hide-sm, td.hide-sm { display:none; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <div class="circuit-eyebrow">Season 2026 &bull; Live Standings</div>
      <div class="circuit-title">Northside<br><span>Circuit</span></div>
      <div class="circuit-sub" id="last-updated">Loading...</div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </header>

  <div class="stats-strip">
    <div class="stat-card"><div class="stat-label">Players</div><div class="stat-val" id="s-players">—</div></div>
    <div class="stat-card"><div class="stat-label">Events Run</div><div class="stat-val" id="s-events">—</div></div>
    <div class="stat-card"><div class="stat-label">Games</div><div class="stat-val">6</div></div>
    <div class="stat-card"><div class="stat-label">Points Leader</div><div class="stat-val accent" id="s-leader">—</div></div>
  </div>

  <div id="main-content">
    <div class="loading-state"><div class="loading-spinner"></div>Fetching standings...</div>
  </div>

  <footer>
    <div class="footer-brand">Northside Circuit 2026</div>
    <div class="footer-note">Powered by Google Sheets <span class="footer-dot">•</span> Updates automatically</div>
  </footer>
</div>
<script>
const RESULTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjB_3m9Q7WufaIipf7sqhxV6p9N2l9269GYad-WSIZw9Ny2gKa7fullKZWJZWegg/pub?gid=467268246&single=true&output=csv";
const PLAYERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjB_3m9Q7WufaIipf7sqhxV6p9N2l9269GYad-WSIZw9Ny2gKa7fullKZWJZWegg/pub?gid=800498507&single=true&output=csv";

const GAMES = [
  {name:"Pokemon Showdown",icon:"⚡"},
  {name:"Halo Reach",icon:"🎯"},
  {name:"Forza Horizon",icon:"🏎️"},
  {name:"Hearthstone",icon:"🃏"},
  {name:"Smash Ultimate",icon:"💥"},
  {name:"Smash Melee",icon:"🌀"},
];

const AVATAR_COLORS = [
  ["rgba(0,155,231,0.2)","#009be7"],["rgba(255,183,57,0.2)","#ffb739"],
  ["rgba(0,200,180,0.2)","#00c8b4"],["rgba(255,100,100,0.2)","#ff6464"],
  ["rgba(160,100,255,0.2)","#a064ff"],["rgba(0,200,80,0.2)","#00c850"],
  ["rgba(255,150,0,0.2)","#ff9600"],["rgba(100,180,255,0.2)","#64b4ff"],
];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const cols=[]; let cur=""; let inQ=false;
    for (let ch of line) {
      if (ch==='"'){inQ=!inQ;}
      else if (ch===','&&!inQ){cols.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>row[h]=(cols[i]||"").replace(/"/g,"").trim());
    return row;
  }).filter(r=>r[headers[0]]);
}

function initials(name){return name.split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();}

function buildLeaderboard(players, results) {
  const standings={};
  players.forEach(p=>{
    const name=p["Full Name"]; if(!name)return;
    standings[name]={name,tag:p["Gamertag"]||"",pic:p["Profile Picture URL"]||"",totalPts:0,events:new Set(),wins:0,gamePts:{}};
    GAMES.forEach(g=>{standings[name].gamePts[g.name]=0;});
  });
  results.forEach(r=>{
    const name=r["Player Name"]; if(!name||!standings[name])return;
    const pts=parseInt(r["Points Earned"])||0;
    const game=r["Game"]||""; const evt=r["Event Name"]||""; const place=parseInt(r["Placement"])||99;
    standings[name].totalPts+=pts; standings[name].events.add(evt);
    if(place===1)standings[name].wins++;
    if(standings[name].gamePts[game]!==undefined)standings[name].gamePts[game]+=pts;
  });

  const ranked=Object.values(standings).sort((a,b)=>b.totalPts-a.totalPts);
  const allEvents=new Set(results.map(r=>r["Event Name"]).filter(Boolean));
  const maxPts=ranked[0]?.totalPts||1;

  document.getElementById("s-players").textContent=ranked.length;
  document.getElementById("s-events").textContent=allEvents.size;
  document.getElementById("s-leader").textContent=ranked[0]?.totalPts||"—";
  document.getElementById("last-updated").textContent=
    `Updated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;

  let html="";

  // Podium
  const top3=ranked.slice(0,3);
  const order=top3.length>=3?[top3[1],top3[0],top3[2]]:top3;
  const pClass=["p2","p1","p3"];
  const pRank=top3.length>=3?["2nd Place","1st Place","3rd Place"]:["1st","2nd","3rd"];
  html+=`<div class="podium-section"><div class="section-label">Top Standings</div><div class="podium">`;
  order.forEach((p,i)=>{
    if(!p)return;
    const idx=ranked.indexOf(p);
    const [bg,fg]=AVATAR_COLORS[idx%AVATAR_COLORS.length];
    const img=p.pic?`<img src="${p.pic}" onerror="this.style.display='none';this.parentNode.innerHTML='${initials(p.name)}'">`:initials(p.name);
    html+=`<div class="podium-card ${pClass[i]}">
      <div class="podium-rank">${pRank[i]}</div>
      <div class="podium-avatar" style="background:${bg};color:${fg}">${img}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-tag">${p.tag}</div>
      <div class="podium-pts">${p.totalPts}</div>
      <div class="podium-pts-label">pts</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Filters
  html+=`<div class="filters"><button class="filter-btn active" onclick="filterTable('All',this)">All games</button>`;
  GAMES.forEach(g=>{html+=`<button class="filter-btn" onclick="filterTable('${g.name}',this)">${g.icon} ${g.name}</button>`;});
  html+=`</div>`;

  // Table
  html+=`<div class="table-wrap"><table>
    <thead><tr>
      <th>#</th><th>Player</th><th class="hide-sm">Game</th>
      <th class="r">Points</th><th class="r hide-sm">Events</th>
      <th class="r hide-sm">Avg</th><th class="r">Wins</th>
    </tr></thead><tbody id="lb-tbody"></tbody></table></div>`;

  // Game breakdown
  html+=`<div class="breakdown-section"><div class="section-label">Per-Game Standings</div><div class="game-grid">`;
  GAMES.forEach(g=>{
    const sorted=Object.values(standings).filter(p=>p.gamePts[g.name]>0).sort((a,b)=>b.gamePts[g.name]-a.gamePts[g.name]).slice(0,4);
    html+=`<div class="game-card"><div class="game-card-title"><span class="game-icon">${g.icon}</span>${g.name}</div>`;
    if(!sorted.length){html+=`<div class="game-row"><span class="game-row-name" style="font-style:italic">No results yet</span></div>`;}
    else{sorted.forEach((p,i)=>{html+=`<div class="game-row"><span class="game-row-name">${i===0?'<span class="game-champ">LEADER &bull; </span>':''}${p.tag||p.name}</span><span class="game-row-pts">${p.gamePts[g.name]}</span></div>`;});}
    html+=`</div>`;
  });
  html+=`</div></div>`;

  document.getElementById("main-content").innerHTML=html;
  window._ranked=ranked; window._maxPts=maxPts; window._standings=standings;
  renderTable("All");
}

function renderTable(game) {
  const ranked=window._ranked; const maxPts=window._maxPts;
  const filtered=game==="All"?ranked:ranked.filter(p=>p.gamePts&&p.gamePts[game]>0);
  const tbody=document.getElementById("lb-tbody"); if(!tbody)return;
  tbody.innerHTML=filtered.map((p,i)=>{
    const idx=ranked.indexOf(p);
    const [bg,fg]=AVATAR_COLORS[idx%AVATAR_COLORS.length];
    const img=p.pic?`<img src="${p.pic}" onerror="this.style.display='none';this.parentNode.innerHTML='${initials(p.name)}'">`:initials(p.name);
    const displayPts=game==="All"?p.totalPts:p.gamePts[game];
    const barPct=Math.round((displayPts/maxPts)*100);
    const avg=p.events.size>0?(p.totalPts/p.events.size).toFixed(1):"—";
    const rankClass=i===0?"gold":i<3?"blue":"";
    return `<tr>
      <td><span class="rank-num ${rankClass}">${i+1}</span></td>
      <td><div class="player-cell"><div class="avatar" style="background:${bg};color:${fg}">${img}</div>
        <div><div class="p-name">${p.name}</div><div class="p-tag">${p.tag}</div></div></div></td>
      <td class="hide-sm"></td>
      <td class="pts-cell"><span class="pts-main">${displayPts}</span>
        <div class="pts-bar-row"><div class="pts-bar"><div class="pts-fill" style="width:${barPct}%"></div></div></div></td>
      <td class="events-cell hide-sm">${p.events.size}</td>
      <td class="avg-cell hide-sm">${avg}</td>
      <td class="wins-cell">${p.wins}</td>
    </tr>`;
  }).join("");
}

function filterTable(game,btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active"); renderTable(game);
}

async function loadData(){
  if(RESULTS_CSV_URL.includes("PASTE_")){
    document.getElementById("main-content").innerHTML=`
      <div class="setup-box"><h2>Almost There!</h2>
        <p>Open this HTML file in a text editor and replace:</p>
        <p><code>https://docs.google.com/spreadsheets/d/e/2PACX-1vRjB_3m9Q7WufaIipf7sqhxV6p9N2l9269GYad-WSIZw9Ny2gKa7fullKZWJZWegg/pub?gid=467268246&single=true&output=csv</code></p>
